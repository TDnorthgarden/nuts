apiVersion: apps/v1
kind: Deployment
metadata:
  name: nuts-service
  labels:
    app: nuts-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nuts-service
  template:
    metadata:
      labels:
        app: nuts-service
    spec:
      containers:
      - name: service
        image: nuts-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: COLLECTOR_ADDRESS
          value: "nuts-collector:50051"
        - name: CONFIG_PATH
          value: "/etc/nuts/service.yaml"
        volumeMounts:
        - name: config
          mountPath: /etc/nuts
          readOnly: true
        - name: data
          mountPath: /var/lib/nuts
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: nuts-service-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nuts-service
  labels:
    app: nuts-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: nuts-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nuts-service-config
data:
  service.yaml: |
    # Service Configuration

    # Collector configuration
    collector:
      address: "nuts-collector:50051"
      timeout: "30s"
      max_retries: 3

    # Storage configuration
    storage:
      policy:
        type: "sqlite"
        sqlite:
          path: "/var/lib/nuts/policies.db"
      event:
        type: "leveldb"
        leveldb:
          path: "/var/lib/nuts/events"
      audit:
        type: "sqlite"
        sqlite:
          path: "/var/lib/nuts/audits.db"
      diagnosis:
        type: "sqlite"
        sqlite:
          path: "/var/lib/nuts/diagnoses.db"

    # Aggregation engine configuration
    aggregation:
      algorithm: "simple"

    # Diagnostic engine configuration
    diagnostic:
      strategy: "builtin"
      builtin:
        rules_path: "/opt/nuts/rules"
      ai:
        enabled: false
      fallback_to_builtin: true

    # Server configuration
    server:
      address: ":8080"
      read_timeout: "30s"
      write_timeout: "30s"
      idle_timeout: "60s"

    # Logging configuration
    logging:
      level: "info"
      format: "json"
      output: "stdout"
